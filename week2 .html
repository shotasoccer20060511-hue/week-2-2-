<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>カフェのページ</title>
</head>
  <body class="bg-white-500">
    <header class="bg-white shadow px-6 py-4">
      <h1 class="text-2xl font-bold text-gray-900 flex justify-center text-center">shopi cafe</h1>
      <p class="text-gray-600 text-sm mt-1 flex justify-center text-center">東京・渋谷のスペシャルティコーヒーショップ</p>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-8">
      <section class="mb-8">
        <h2 class="text-xl font-bold text-gray-800 mb-4 underline">メニュー</h2>

        <div class="bg-white rounded-lg shadow p-6 mb-4 hover:bg-gray-50">
          <h3 class="text-lg font-bold text-gray-900">ブレンドコーヒー</h3>
          <p class="text-gray-600 mt-1">本日のおすすめ。深みとコクが特徴です。</p>
          <p class="text-blue-600 font-bold mt-2">600円</p>
        </div>

        <div class="bg-white rounded-lg shadow p-6 mb-4 hover:bg-gray-50">
          <h3 class="text-lg font-bold text-gray-900">カフェラテ</h3>
          <p class="text-gray-600 mt-1">なめらかなミルクとエスプレッソのバランス。</p>
          <p class="text-blue-600 font-bold mt-2">700円</p>
        </div>
        <div class="bg-white rounded-lg shadow p-6 mb-4 hover:bg-gray-50">
         <h3 class="text-lg font-bold text-gray-900">ホワイトモカ</h3>
         <p class="text-gray-600 mt-1">柔らかな味わい。</p>
         <p class="text-blue-600 font-bold mt-2">500円</p>
            
        </div>
      </section>
    </main>

    <footer class="bg-gray-100 text-center py-6 text-gray-500 text-sm">
      <p>2024 POSSE CAFE</p>
    </footer>
  </body>
</html>
